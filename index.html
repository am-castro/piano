<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KeyPiano</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&family=Space+Grotesk:wght@500;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <h1>KeyPiano</h1>
        <p>Piano virtual · 2 oitavas · 6 timbres</p>
      </div>
      <div class="pickers">
        <label class="mode-picker" for="layoutSelect">
          Layout de teclas
          <select id="layoutSelect" aria-label="Selecionar layout de teclas">
            <option value="abnt2">ABNT2</option>
            <option value="us">US</option>
          </select>
        </label>
        <label class="mode-picker" for="modeSelect">
          Modo de som
          <select id="modeSelect" aria-label="Selecionar modo de som">
            <option value="piano">Piano</option>
            <option value="organ">Organ</option>
            <option value="synth">Synth</option>
            <option value="bell">Bell</option>
            <option value="bass">Bass</option>
            <option value="flute">Flute</option>
          </select>
        </label>
        <label class="mode-picker mode-picker-range" for="volumeSlider">
          Volume
          <div class="range-wrap">
            <input id="volumeSlider" type="range" min="0" max="100" value="75" aria-label="Volume master" />
            <output id="volumeValue" for="volumeSlider">75%</output>
          </div>
        </label>
        <label class="mode-picker mode-picker-check" for="sustainToggle">
          Sustain
          <input id="sustainToggle" type="checkbox" role="switch" aria-label="Ativar sustain" />
        </label>
      </div>
    </header>

    <section class="hud" aria-live="polite">
      <div class="hud-item">
        <span>Modo atual</span>
        <strong id="modeName">Piano</strong>
      </div>
      <div class="hud-item">
        <span>Última tecla</span>
        <strong id="lastKey">-</strong>
      </div>
      <div class="hud-item">
        <span>Nota</span>
        <strong id="lastNote">-</strong>
      </div>
      <div class="hud-item">
        <span>Sustain</span>
        <strong id="sustainStatus">Off</strong>
      </div>
    </section>

    <section class="keyboard-wrap" aria-label="Teclado virtual">
      <div id="keyboard" class="keyboard"></div>
    </section>

    <section class="legend">
      <p id="layoutHint"></p>
      <p>Clique e segure nas teclas com o mouse também.</p>
    </section>
  </main>

  <script type="module" src="js/app.js"></script>
</body>
</html>
